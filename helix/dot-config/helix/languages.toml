# TypeScript / JavaScript + Biome
#
# Keep TypeScript language features from typescript-language-server, but route
# save-time formatting through Biome so projects with a biome config get Biome's
# formatter and assist actions instead of Prettier / ESLint.

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[[language]]
name = "typescript"
auto-format = true
formatter = { command = "biome", args = ["check", "--write", "--linter-enabled=false", "--stdin-file-path", "%{buffer_name}"] }
language-servers = [{ name = "typescript-language-server", except-features = ["format"] }, "biome"]

[[language]]
name = "tsx"
auto-format = true
formatter = { command = "biome", args = ["check", "--write", "--linter-enabled=false", "--stdin-file-path", "%{buffer_name}"] }
